<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Fitness Tracker</title>

<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/static/icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#181c26">

<link rel="stylesheet" href="/static/style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>

<!-- Écran : programme du jour -->
<section id="screen-today" class="screen active">
  <h1>Aujourd'hui</h1>
  <p class="sub" id="today-sub">Chargement...</p>
  <div id="today-content"></div>
</section>

<!-- Écran : poids -->
<section id="screen-weight" class="screen">
  <h1>Poids</h1>
  <p class="sub">Note ton poids régulièrement pour suivre la tendance</p>
  <div class="card">
    <div class="weight-form">
      <input type="number" step="0.1" id="weight-input" placeholder="Poids (kg)">
      <button style="width:auto;padding:12px 20px" onclick="submitWeight()">Ajouter</button>
    </div>
  </div>
  <div class="card">
    <h2>Évolution</h2>
    <canvas id="weightChart"></canvas>
  </div>
</section>

<!-- Écran : dashboard -->
<section id="screen-dashboard" class="screen">
  <h1>Dashboard</h1>
  <p class="sub">Ta progression en un coup d'œil</p>
  <div id="dashboard-content"></div>
</section>

<!-- Écran : réglages / choix du programme -->
<section id="screen-settings" class="screen">
  <h1>Programme</h1>
  <p class="sub">Choisis ton programme d'entraînement</p>
  <div class="template-choice" id="template-list"></div>
</section>

<nav class="tabbar">
  <button data-screen="today" class="active" onclick="showScreen('today')">Aujourd'hui</button>
  <button data-screen="weight" onclick="showScreen('weight')">Poids</button>
  <button data-screen="dashboard" onclick="showScreen('dashboard')">Dashboard</button>
  <button data-screen="settings" onclick="showScreen('settings')">Programme</button>
</nav>

<script src="/static/app.js"></script>
</body>
</html>
