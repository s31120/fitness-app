<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>SeeBorg</title>

<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/static/icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SeeBorg">
<meta name="theme-color" content="#0f1115">
<meta name="mobile-web-app-capable" content="yes">

<link rel="stylesheet" href="/static/style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>

<!-- Écran de connexion / inscription -->
<section id="screen-login" class="login-screen active">
  <div class="login-card">
    <img src="/static/icons/icon-192.png" alt="" class="login-icon">
    <h1>SeeBorg</h1>
    <p class="sub" id="login-sub">Connecte-toi pour accéder à ton suivi</p>

    <div class="segmented">
      <button id="seg-login" class="active" onclick="switchAuthMode('login')">Connexion</button>
      <button id="seg-register" onclick="switchAuthMode('register')">Inscription</button>
    </div>

    <form id="login-form" onsubmit="handleLogin(event)">
      <input type="text" id="login-user" placeholder="Identifiant" autocomplete="username" required>
      <input type="password" id="login-pass" placeholder="Mot de passe" autocomplete="current-password" required>
      <p id="login-error" class="login-error"></p>
      <button type="submit" id="login-submit">Se connecter</button>
    </form>

    <form id="register-form" onsubmit="handleRegister(event)" style="display:none">
      <input type="text" id="register-nom" placeholder="Ton prénom" autocomplete="name" required>
      <input type="text" id="register-user" placeholder="Choisis un identifiant" autocomplete="username" required>
      <input type="password" id="register-pass" placeholder="Choisis un mot de passe" autocomplete="new-password" required>
      <p id="register-error" class="login-error"></p>
      <button type="submit" id="register-submit">Créer mon compte</button>
    </form>
  </div>
</section>

<div id="app-shell" class="app-shell">
  <header class="app-header">
    <div id="header-datetime" class="header-datetime"></div>
    <div class="header-brand">
      <img src="/static/icons/icon-192.png" alt="" class="app-header-icon">
      <span class="app-header-name">SeeBorg</span>
    </div>
  </header>

  <main>
    <!-- Écran : ma séance -->
    <section id="screen-today" class="screen active">
      <h1 id="today-greeting">Bonjour</h1>
      <p class="sub" id="today-sub">Chargement...</p>
      <div id="today-content"></div>
    </section>

    <!-- Écran : dashboard -->
    <section id="screen-dashboard" class="screen">
      <h1>Dashboard</h1>
      <p class="sub">Ta progression en un coup d'œil</p>
      <div id="dashboard-content"></div>
    </section>

    <!-- Écran : réglages / choix du programme -->
    <section id="screen-settings" class="screen">
      <h1>Programme</h1>
      <p class="sub">Choisis un template ou construis le tien</p>

      <div class="segmented">
        <button id="seg-templates" class="active" onclick="switchProgramMode('templates')">Templates</button>
        <button id="seg-custom" onclick="switchProgramMode('custom')">Personnalisé</button>
      </div>

      <div id="templates-panel" class="template-choice"></div>

      <div id="custom-panel" style="display:none">
        <div id="custom-days"></div>
        <button class="secondary" onclick="addCustomDay()">+ Ajouter un jour</button>
        <button onclick="saveCustomProgram()">Enregistrer le programme</button>
      </div>

      <button class="secondary" onclick="handleLogout()" style="margin-top:24px">Se déconnecter</button>
    </section>

    <!-- Écran : poids -->
    <section id="screen-weight" class="screen">
      <h1>Poids</h1>
      <p class="sub">Note ton poids régulièrement pour suivre la tendance</p>
      <div class="card">
        <div class="weight-form">
          <input type="number" step="0.1" inputmode="decimal" id="weight-input" placeholder="Poids (kg)">
          <button class="btn-inline" onclick="submitWeight()">Ajouter</button>
        </div>
      </div>
      <div class="card">
        <h2>Évolution</h2>
        <canvas id="weightChart"></canvas>
      </div>
    </section>
  </main>

  <nav class="tabbar">
    <button data-screen="today" class="active" onclick="showScreen('today')">
      <span class="tab-label">Ma séance</span>
    </button>
    <button data-screen="dashboard" onclick="showScreen('dashboard')">
      <span class="tab-label">Dashboard</span>
    </button>
    <button data-screen="settings" onclick="showScreen('settings')">
      <span class="tab-label">Programme</span>
    </button>
    <button data-screen="weight" onclick="showScreen('weight')">
      <span class="tab-label">Poids</span>
    </button>
  </nav>
</div>

<script src="/static/app.js"></script>
</body>
</html>
